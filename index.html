<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reproductor de Video - Validador de Datos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 25px;
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        
        .descripcion {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }
        
        .video-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 56.25%; /* Relación 16:9 */
            height: 0;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .info {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85em;
            color: #555;
            margin-top: 15px;
        }
        
        .info a {
            color: #667eea;
            text-decoration: none;
        }
        
        .info a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Validador de Datos</h1>
        <div class="descripcion">Versión 8.69.2 - Video demostrativo</div>
        
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/uBnmtEImu_E?modestbranding=1&rel=0&showinfo=0&controls=1&color=white&iv_load_policy=3&hl=es&autohide=1&playsinline=1" 
                title="Reproductor de video Validador de Datos" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>
        
        <div class="info">
            💡 <strong>Información:</strong><br>
            • El video no tiene sonido - se recomienda usar pantalla completa.<br>
            • Haz clic en el botón de pantalla completa [⛶] para mejor visualización.<br>
            • <a href="https://youtu.be/uBnmtEImu_E" target="_blank">Abrir en YouTube</a> (si necesitas descargarlo)
        </div>
    </div>
</body>
</html>
